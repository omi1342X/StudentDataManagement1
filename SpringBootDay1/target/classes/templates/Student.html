<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

<script>
       $(document).ready(function(){
    	   GetAllStudentData();
    	   $("#btnadd").click(function(){
    		   AddStudentData();
    	   });
       });
       
       function GetAllStudentData(){
    	   $.ajax({
    		   url:'http://localhost:9191/api/student',
    		   method:'get',
    		   contentType:'application/json',
    		   success:function(resp){
    			   //console.log(resp);
    			   $("#tbldata").empty();
    			   $.each(resp,function(i,d){
    				   $("#tbldata").append("<tr><td>"+d.rno+"</td><td>"+d.name+"</td><td>"+d.qualification+"</td><td>"+d.percentage+"</td></tr>")
    			   })
    		   }
    	   })
       }

       function AddStudentData(){
    	   let st={
    			   "name":$("#txtname").val(),
    			   "qualification":$("#txtqua").val(),
    			   "percentage":$("#txtper").val()
    	   };
    	   
    	   $.ajax({
    		   url:'http://localhost:9191/api/student',
    		   method:'post',
    		   data:JSON.stringify(st),
    		   contentType:'application/json',
    		   success:function(resp){
    			   alert("Student Added Successfully!!")
    			   Clear();
    			   GetAllStudentData();
    		   }
    		   })
    	  
       };
       
       function Clear(){
    	   $("#txtrno").val("");
    	   $("#txtname").val("");
		   $("#txtqua").val("");
		   $("#txtper").val("");
       }


</script>
</head>
<body>
<div class="row">
<div class="col-md-4">
   <div class="card">
   <div class="class-header bg-info">
   <h2> Add Student</h2>
   </div>
   <div class="card-body">
   <div class="form-group">
              <label>Rno</label>
              <input type="text" id="txtrno" class="form-control" disabled="disabled"/>
               <label>Name</label>
              <input type="text" id="txtname" class="form-control"/>
               <label>Qualification</label>
              <input type="text" id="txtqua" class="form-control"/>
               <label>Percentage</label>
              <input type="text" id="txtper" class="form-control"/>
   </div>
   </div>
   <div class="card-footer">
       <button class="btn btn-success"  id="btnadd">Add</button>   
       <button class="btn btn-warning"  id="btnupdate">Update</button>   
   </div>
   </div>

</div>
<div class="col-md-8">
<table class="table table-bordered table-hover table-striped" >
     <thead>
     <tr>
     <th>Roll No</th>
     <th>Name</th>
     <th>Qualification</th>
     <th>Percentage</th>
     </tr>
     </thead>
     <tbody id="tbldata"></tbody>
</table>
</div>
</div>


</body>
</html>
